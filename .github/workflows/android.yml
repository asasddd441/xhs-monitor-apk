name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle-8.7-bin.zip -d /opt/

      - name: Build APK
        run: /opt/gradle-8.7/bin/gradle assembleDebug --stacktrace 2>&1 | tee build_log.txt

      - name: Upload APK on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: xhs-monitor-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build_log.txt
